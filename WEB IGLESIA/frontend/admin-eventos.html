<!doctype html>
<html lang="es">

<head>
    <title>Administrar Eventos - Casa del Gran REY</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- BARRA DE NAVEGACIÓN -->
    <script src="js/navbar.js"></script>

    <div class="container" style="margin-top: 100px; margin-bottom: 50px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-dark text-white p-4 text-center rounded-top-4">
                        <h3 class="mb-0"><i class="fa-solid fa-lock text-gold me-2"></i> Panel de Administración</h3>
                        <p class="mb-0 text-white-50 small mt-1">Gestión interna de eventos de la Iglesia</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        
                        <!-- Formulario para añadir eventos -->
                        <h5 class="fw-bold mb-4" style="color: var(--primary-dark);">Añadir Nuevo Evento</h5>
                        <form id="add-event-form">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Título del Evento</label>
                                <input type="text" class="form-control" id="event-title" required placeholder="Ej. Culto General de Alabanza">
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Fecha y Hora de Inicio</label>
                                    <input type="datetime-local" class="form-control" id="event-start" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Fecha y Hora de Fin (Opcional)</label>
                                    <input type="datetime-local" class="form-control" id="event-end">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Descripción / Detalles</label>
                                <textarea class="form-control" id="event-description" rows="3" placeholder="Información adicional sobre el evento..."></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-gold w-100 fw-bold py-2" id="submit-btn">
                                <i class="fa-solid fa-plus me-2"></i> Guardar Evento en el Calendario
                            </button>
                        </form>

                        <hr class="my-5">

                        <!-- Lista de eventos para borrar -->
                        <h5 class="fw-bold mb-4 text-danger"><i class="fa-solid fa-trash me-2"></i> Eliminar Eventos Existentes</h5>
                        <div id="event-list" class="list-group">
                            <div class="text-center text-muted p-3">Cargando eventos...</div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase Script (Module) -->
    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Función Helper para Encriptación SHA-256
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ---- SEGURIDAD BÁSICA (Contraseña) ----
        const password = prompt("Introduce la contraseña de administrador:");
        if(!password) {
            document.body.innerHTML = "<div class='text-center mt-5'><h1 class='text-danger'>Acceso Cancelado</h1></div>";
            throw new Error("Acceso denegado");
        }
        
        const hashedPass = await sha256(password);
        if(hashedPass !== "069d3cc49a4893dd7c34f8ed592d5d6058abe44ee7622687e0ad2c72046ec852") {
            document.body.innerHTML = "<div class='text-center mt-5'><h1 class='text-danger'>Acceso Denegado</h1><p>Contraseña incorrecta.</p></div>";
            throw new Error("Acceso denegado"); // Detiene la ejecución del script
        }

        const eventsRef = collection(db, "eventos");
        const eventListEl = document.getElementById("event-list");
        const form = document.getElementById("add-event-form");
        const submitBtn = document.getElementById("submit-btn");

        // Función para cargar eventos en la lista
        async function loadEvents() {
            eventListEl.innerHTML = '<div class="text-center p-2"><span class="spinner-border spinner-border-sm text-muted"></span></div>';
            try {
                const snapshot = await getDocs(eventsRef);
                eventListEl.innerHTML = '';
                
                if(snapshot.empty) {
                    eventListEl.innerHTML = '<div class="text-muted text-center p-3">No hay eventos creados.</div>';
                    return;
                }

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const date = new Date(data.start).toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                    
                    const div = document.createElement('div');
                    div.className = "list-group-item d-flex justify-content-between align-items-center";
                    div.innerHTML = `
                        <div>
                            <strong>${data.title}</strong><br>
                            <small class="text-muted">${date}</small>
                        </div>
                        <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${docSnap.id}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    `;
                    eventListEl.appendChild(div);
                });

                // Añadir evento click a los botones de borrar
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("¿Seguro que quieres borrar este evento de forma permanente?")) {
                            const id = e.currentTarget.getAttribute('data-id');
                            await deleteDoc(doc(db, "eventos", id));
                            alert("Evento eliminado.");
                            loadEvents(); // Recargar lista
                        }
                    });
                });

            } catch(e) {
                console.error(e);
                eventListEl.innerHTML = '<div class="text-danger p-2">Error al cargar eventos de Firebase.</div>';
            }
        }

        // Función para guardar nuevo evento
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';

            const title = document.getElementById('event-title').value;
            const start = document.getElementById('event-start').value; // Formato YYYY-MM-DDTHH:MM
            const end = document.getElementById('event-end').value;
            const description = document.getElementById('event-description').value;

            try {
                const eventData = { title, start, description };
                if (end) eventData.end = end;
                
                await addDoc(eventsRef, eventData);
                alert("¡Evento guardado con éxito!");
                form.reset();
                loadEvents(); // Recargar lista
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Error al guardar el evento. Verifica la consola.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-plus me-2"></i> Guardar Evento en el Calendario';
            }
        });

        // Cargar eventos al iniciar
        loadEvents();
    </script>
</body>
</html>
