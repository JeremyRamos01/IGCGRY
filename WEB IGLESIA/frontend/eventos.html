<!doctype html>
<html lang="es">

<head>
    <title>Eventos - Casa del Gran REY</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Calendario de eventos y actividades de la Iglesia Evangélica Casa del Gran REY.">

    <!-- Bootstrap CSS v5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FullCalendar CSS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .fc-theme-standard td,
        .fc-theme-standard th {
            border-color: rgba(0, 0, 0, 0.1);
        }

        .fc-col-header-cell-cushion,
        .fc-daygrid-day-number {
            color: var(--primary-dark);
            text-decoration: none;
        }

        .fc-event {
            cursor: pointer;
        }

        .event-list-card {
            border-left: 4px solid var(--accent-gold);
            transition: transform 0.3s ease;
        }

        .event-list-card:hover {
            transform: translateX(5px);
        }
    </style>
</head>

<body>

    <!-- BARRA DE NAVEGACIÓN CENTRALIZADA -->
    <script src="js/navbar.js"></script>

    <!-- PAGE HEADER -->
    <header class="page-header" data-aos="fade-in" data-aos-duration="1500">
        <div class="container">
            <h1 class="mb-3">Eventos y Actividades</h1>
            <p class="lead text-white-50">Mantente al tanto de todas nuestras reuniones y eventos especiales</p>
        </div>
    </header>


    <main>
        <section class="section-padding bg-light">
            <div class="container">
                <div class="row g-5">
                    <!-- Calendario Completo -->
                    <div class="col-lg-12 mb-5" data-aos="fade-up">
                        <div class="card premium-card border-0 shadow-sm">
                            <div class="card-body p-4 p-md-5">
                                <h3 class="fw-bold mb-4" style="color: var(--primary-dark);"><i class="fa-regular fa-calendar-days text-gold me-2"></i> Calendario General</h3>
                                <div id='calendar'></div>
                            </div>
                        </div>
                    </div>

                    <!-- Agenda de Eventos Destacados -->
                    <div class="col-lg-12" data-aos="fade-up" data-aos-delay="100">
                        <h3 class="fw-bold mb-4" style="color: var(--primary-dark);"><i class="fa-solid fa-star text-gold me-2"></i> Próximos Eventos Destacados</h3>
                        <div id="event-agenda-container" class="row g-4">
                            <!-- Los eventos se cargarán aquí en formato tarjetas grandes -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal para Detalles del Evento -->
    <div class="modal fade" id="eventModal" tabindex="-1" aria-labelledby="eventModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="eventModalLabel" style="color: var(--primary-dark);">Detalles
                        del Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h4 id="modalEventTitle" class="mb-3" style="color: var(--accent-gold);"></h4>
                    <p class="mb-2"><i class="fa-regular fa-clock me-2 text-muted"></i> <span
                            id="modalEventTime"></span></p>
                    <p class="mb-3"><i class="fa-solid fa-location-dot me-2 text-muted"></i> <span
                            id="modalEventLocation">Casa del Gran REY</span></p>
                    <hr>
                    <p id="modalEventDescription" class="text-muted"></p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary rounded-pill px-4"
                        data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER CENTRALIZADO -->
    <script src="js/footer.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });
    </script>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function initEventos() {
            var calendarEl = document.getElementById('calendar');
            var eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
            
            // 1. Obtener eventos de Firebase
            let eventosDB = [];
            try {
                const querySnapshot = await getDocs(collection(db, "eventos"));
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    eventosDB.push({
                        id: doc.id,
                        title: data.title,
                        start: data.start, 
                        end: data.end,
                        description: data.description,
                        destacado: data.destacado === true,
                        backgroundColor: data.backgroundColor || '#0f172a'
                    });
                });
            } catch (error) {
                console.error("Error al obtener eventos de Firebase. ¿Están configuradas tus credenciales?", error);
            }

            // 2. Inicializar calendario
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana',
                    day: 'Día'
                },
                events: eventosDB,
                eventClick: function (info) {
                    document.getElementById('modalEventTitle').textContent = info.event.title;

                    let dateStr = info.event.start.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    let timeStr = info.event.start.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                    if(timeStr === "00:00") timeStr = "Todo el día";

                    document.getElementById('modalEventTime').textContent = dateStr + (info.event.allDay ? '' : ' - ' + timeStr);
                    document.getElementById('modalEventDescription').textContent = info.event.extendedProps.description || 'Sin descripción disponible.';

                    eventModal.show();
                }
            });

            calendar.render();

            // 3. Renderizar lista lateral
            renderEventList(eventosDB);
        }

        // Ejecutar inmediatamente
        initEventos();

        function renderEventList(eventosDB) {
            const container = document.getElementById('event-agenda-container');
            container.innerHTML = ''; 

            const ahora = new Date();
            const proximos = eventosDB.filter(e => new Date(e.start) >= ahora && e.destacado)
                .sort((a, b) => new Date(a.start) - new Date(b.start))
                .slice(0, 6); // Mostrar hasta 6

            if (proximos.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-muted text-center p-5 bg-white rounded-3 border">No hay eventos próximos destacados programados.</p></div>';
                return;
            }

            proximos.forEach(ev => {
                const fecha = new Date(ev.start);
                const dia = fecha.getDate();
                const mes = fecha.toLocaleDateString('es-ES', { month: 'long' }).toUpperCase();
                
                let timeStr = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                if (timeStr === "00:00") timeStr = "Todo el día";

                const desc = ev.description ? ev.description : 'Acompañanos en este evento especial de la iglesia.';

                let html = '';
                if (ev.flyerUrl && ev.flyerUrl.trim() !== '') {
                    html = `
                        <div class="col-md-6 col-lg-4">
                            <div class="h-100 rounded-4 overflow-hidden shadow-sm" style="transition: transform 0.3s; cursor: pointer;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                                <img src="${ev.flyerUrl}" alt="${ev.title}" class="img-fluid w-100 h-100" style="object-fit: cover;">
                            </div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="col-md-6 col-lg-4">
                            <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden" style="transition: transform 0.3s; cursor: pointer;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                                <div class="card-header border-0 text-white p-3 d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, var(--primary-dark), #1e293b);">
                                    <span class="badge bg-gold text-dark fs-6 rounded-pill"><i class="fa-regular fa-calendar"></i> ${dia} ${mes}</span>
                                    <small><i class="fa-regular fa-clock"></i> ${timeStr}</small>
                                </div>
                                <div class="card-body p-4">
                                    <h5 class="card-title fw-bold text-dark mb-3">${ev.title}</h5>
                                    <p class="card-text text-muted small">${desc.substring(0, 100)}${desc.length > 100 ? '...' : ''}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML += html;
            });
        }
    </script>
</body>

</html>
